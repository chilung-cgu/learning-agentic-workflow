name: Copilot CLI Agentic Translation Workflow

on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨自動執行
  workflow_dispatch: # 允許在 GitHub 網頁上手動點擊執行

permissions:
  contents: write

jobs:
  agentic-translate-job:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Clone 本地程式碼 (學習專案)
        run: |
          mkdir -p repos
          git clone --depth 1 "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" repos/current

      - name: 2. Clone 目標上游 (github/copilot-cli)
        run: |
          git clone --depth 1 "https://github.com/github/copilot-cli.git" repos/upstream

      - name: 3. 準備最小翻譯工作區
        run: |
          mkdir -p repos/translate-work
          cp repos/current/README.md repos/translate-work/README.md || touch repos/translate-work/README.md
          cp repos/upstream/README.md repos/translate-work/upstream.README.md

      - name: 4. Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 5. 安裝 GitHub Copilot CLI Agent
        run: npm install -g @github/copilot

      - name: 6. 執行 Copilot CLI Agent 進行自動翻譯
        env:
          # 取代舊的 OpenAI 或 Gemini Key，這裡必須是勾選了 "Copilot Requests" 權限的 GitHub PAT
          GH_TOKEN: ${{ secrets.COPILOT_PAT_SECRET }}
        run: |
          cd repos/translate-work
          # 啟動無人值守 (--allow-all) 實驗模式 (--experimental) 進行翻譯
          copilot --experimental --allow-all -p '你只能讀寫目前的 README.md，並且只能參考 upstream.README.md。請將 upstream.README.md 的內容全文精準翻譯為繁體中文(zh-TW)後覆寫 README.md。請務必保持 Markdown 結構、超連結與程式碼區塊不變。絕對不要搜尋或操作目錄下的其他檔案。'

      - name: 7. 拷貝結果並驗證與提交 (Push)
        run: |
          cp repos/translate-work/README.md repos/current/README.md
          cd repos/current
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add README.md
          
          if git diff --staged --quiet; then
            echo "沒有偵測到新的變更，不需要 Commit。"
          else
            git commit -m "chore: [Agent] update translation via GitHub Copilot CLI"
            git push origin HEAD
          fi
